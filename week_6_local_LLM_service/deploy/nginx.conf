# Witcher Cookbook — Nginx site config
#
# Serves the built SPA (deploy target: /opt/witcher-cookbook/static) and
# reverse-proxies /api/* to the Ktor backend on 127.0.0.1:8080.
#
# TLS via Let's Encrypt (certbot). Ollama is NOT exposed here — it stays bound
# to localhost and is only reached by the backend process (spec NFR-10, R-4).

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name witcher-cookbook.example.com;

    # Allow ACME HTTP-01 challenge before the cert exists.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name witcher-cookbook.example.com;

    # Let's Encrypt certificate paths (certbot manages these).
    ssl_certificate     /etc/letsencrypt/live/witcher-cookbook.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/witcher-cookbook.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Static SPA. History-mode fallback to index.html for client routes.
    root /opt/witcher-cookbook/static;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API. X-Forwarded-For feeds the per-IP rate limiter (Task B2).
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Server-Sent Events (Task E2): stream tokens through unbuffered.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}
